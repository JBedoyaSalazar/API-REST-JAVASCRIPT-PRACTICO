<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dosis:wght@700;800&family=Red+Hat+Display:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/output.css">
    <link rel="shortcut icon" href="./icons/favicon.png" type="image/x-icon">
</head>

<body>


    <header id="header" class="px-6 pt-10">
        <span id="backButton" class="font-medium text-4xl mb-4 cursor-pointer md:inline-block">&lt;</span>
        <h1 id="headerTitle" class="mb-4 italic">THE BEST MOVIES</h1>
        <h2 id="headerCategoryTitle" class="mb-4">Acción</h2>

        <form id="searchForm" class="flex items-center justify-center w-full flex-nowrap">
            <input id="searchInput" type="text" placeholder="Vengadores" class="h-12 w-full rounded-l-lg" />
            <button id="searchFormButton" class="w-14 h-12 rounded-r-lg">🔍</button>
        </form>
    </header>

    <section id="trendingPreview" class="mt-12 px-6 lg:w-[80%] lg:mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h2 class="trendingPreview-title">Tendencias</h2>
            <button id="trendingButton" class="rounded-lg h-8 w-[72px]">Ver más</button>
        </div>

        <article id="trendingPreview-movieList"
            class="flex overflow-x-auto no-scrollbar lg:flex-wrap lg:overflow-x-visible lg:justify-center gap-7 pb-4 snap-x">
            <!-- Se insertan las peliculas de la API -->
        </article>
    </section>

    <section id="categoriesPreview" class="mt-12 px-6">
        <h2 class="mb-6 italic">Categorías</h2>

        <article id="categoriesPreview-list" class="grid grid-cols-2 md:grid-cols-3 w-max mx-auto gap-x-8 gap-y-4 pb-4">
            <!-- Se insertan las categorias de la API -->
        </article>
    </section>

    <section id="genericList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-4 px-6 py-8">
        <!-- Se insertan las peliculas de la API -->
    </section>

    <section id="movieDetail" class="rounded-t-2xl px-6 py-8 mt-[403px] relative bg-bg-surface w-full hidden">

        <h1 id="movieDetailTitle" class="inline-block w-[80%] mb-4 p-0"></h1>
        <span id="movieDetailScore"
            class="inline-block w-[18%] font-bold text-right before:content-['★'] before:text-text-main text-text-muted before:pr-1"></span>
        <p id="movieDetailDescription" class="mb-6 text-text-muted">
            <!-- Se inserta la descripcion de la API -->
        </p>



        <article id="movieDetail-categoriesList"
            class="flex overflow-x-auto no-scrollbar lg:flex-wrap lg:overflow-x-visible lg:justify-center gap-7 pb-4 snap-x flex-wrap">
            <!-- Se insertan las categorias de la API -->
        </article>

        <article class="mt-6">
            <h2 class="mb-4">Películas similares</h2>

            <div id="movieDetail-similarMovies"
                class="flex overflow-x-auto no-scrollbar lg:flex-wrap lg:overflow-x-visible lg:justify-center gap-7 pb-4 snap-x">
                <!-- Se insertan las peliculas de la API -->
            </div>
        </article>
    </section>

    <footer
        class="mt-auto w-full z-50 bg-bg-surface border-t border-border-subtle text-text-muted text-center h-10 flex justify-center items-center">
        Hecho con amor 🖤 - Jefred</footer>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./src/secrets.js"></script>
    <script src="./src/nodes.js"></script>
    <script src="./src/main.js"></script>
    <script src="./src/navigation.js"></script>

</body>

</html>
