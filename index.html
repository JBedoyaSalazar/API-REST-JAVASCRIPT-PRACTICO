<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Dosis:wght@700;800&family=Red+Hat+Display:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./src/output.css">
    <link rel="shortcut icon" href="./icons/favicon.png" type="image/x-icon">
</head>

<body>


    <header id="header" class="px-6 pt-10">
        <span id="backButton" class="font-medium text-4xl mb-4 cursor-pointer md:inline-block">&lt;</span>
        <h1 id="headerTitle" class="mb-4 italic">THE BEST MOVIES</h1>
        <h2 id="headerCategoryTitle" class="mb-4">Acción</h2>

        <form id="searchForm" class="flex items-center justify-center w-full flex-nowrap">
            <input type="text" placeholder="Vengadores" class="h-12 w-full rounded-l-lg" />
            <button id="searchFormButton" class="w-14 h-12 rounded-r-lg">🔍</button>
        </form>
    </header>

    <section id="trendingPreview" class="mt-12 px-6 lg:w-[80%] lg:mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h2 class="trendingPreview-title">Tendencias</h2>
            <button id="trendingButton" class="rounded-lg h-8 w-[72px]">Ver más</button>
        </div>

        <article id="trendingPreview-movieList"
            class="flex overflow-x-auto no-scrollbar lg:flex-wrap lg:overflow-x-visible lg:justify-center gap-7 pb-4 snap-x">
            <!-- Se insertan las peliculas de la API -->
        </article>
    </section>

    <section id="categoriesPreview" class="mt-12 px-6">
        <h2 class="mb-6 italic">Categorías</h2>

        <article id="categoriesPreview-list" class="grid grid-cols-2 md:grid-cols-3 w-max mx-auto gap-x-8 gap-y-4 pb-4">
            <!-- Se insertan las categorias de la API -->
        </article>
    </section>

    <section id="genericList" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-7 gap-4 px-6 py-8">
        <div class="cursor-pointer">
            <img src="https://image.tmdb.org/t/p/w300/adOzdWS35KAo21r9R4BuFCkLer6.jpg"
                class="w-full h-auto object-cover rounded-lg" alt="Nombre de la película" />
        </div>

        <div class="cursor-pointer">
            <img src="https://image.tmdb.org/t/p/w300/adOzdWS35KAo21r9R4BuFCkLer6.jpg"
                class="w-full h-auto object-cover rounded-lg" alt="Nombre de la película" />
        </div>

        <div class="cursor-pointer">
            <img src="https://image.tmdb.org/t/p/w300/adOzdWS35KAo21r9R4BuFCkLer6.jpg"
                class="w-full h-auto object-cover rounded-lg" alt="Nombre de la película" />
        </div>
    </section>

    <section id="movieDetail" class="rounded-t-2xl px-6 py-8 mt-[403px] z-10 relative bg-bg-surface w-full hidden">
        <h1 class="inline-block w-[80%] mb-4 p-0">Deadpool</h1>
        <span
            class="inline-block w-[18%] font-bold text-right before:content-['★'] before:text-text-main text-text-muted before:pr-1">7.6</span>
        <p class="mb-6 text-text-muted">
            Wisecracking mercenary Deadpool battles the evil and powerful Cable and other bad guys to save a boy's life.
        </p>

        <article class="grid grid-cols-2 md:grid-cols-3 w-max mx-auto gap-x-8 gap-y-4 pb-4">
            <div class="flex">
                <h3 id="id28"
                    class="category-title mb-2 cursor-pointer flex items-center whitespace-nowrap overflow-hidden text-ellipsis">
                    Romance
                </h3>
            </div>

            <div class="flex">
                <h3 id="id16"
                    class="category-title mb-2 cursor-pointer flex items-center whitespace-nowrap overflow-hidden text-ellipsis">
                    Drama
                </h3>
            </div>

            <div class="flex">
                <h3 id="id14"
                    class="category-title mb-2 cursor-pointer flex items-center whitespace-nowrap overflow-hidden text-ellipsis">
                    Acción
                </h3>
            </div>
        </article>

        <article class="mt-6">
            <h2 class="mb-4">Películas similares</h2>

            <div class="flex overflow-x-auto no-scrollbar gap-4 pb-4 snap-x">
                <div
                    class="snap-start shrink-0 w-[125px] md:w-[calc(33.33%-1rem)] lg:w-[calc(14.28%-1rem)] cursor-pointer">
                    <img src="https://image.tmdb.org/t/p/w300/adOzdWS35KAo21r9R4BuFCkLer6.jpg"
                        class="h-auto w-full object-cover rounded-lg" alt="Nombre de la película" />
                </div>

                <div
                    class="snap-start shrink-0 w-[125px] md:w-[calc(33.33%-1rem)] lg:w-[calc(14.28%-1rem)] cursor-pointer">
                    <img src="https://image.tmdb.org/t/p/w300/adOzdWS35KAo21r9R4BuFCkLer6.jpg"
                        class="h-auto w-full object-cover rounded-lg" alt="Nombre de la película" />
                </div>

                <div
                    class="snap-start shrink-0 w-[125px] md:w-[calc(33.33%-1rem)] lg:w-[calc(14.28%-1rem)] cursor-pointer">
                    <img src="https://image.tmdb.org/t/p/w300/adOzdWS35KAo21r9R4BuFCkLer6.jpg"
                        class="h-auto w-full object-cover rounded-lg" alt="Nombre de la película" />
                </div>
            </div>
        </article>
    </section>

    <footer
        class="mt-auto w-full z-50 bg-bg-surface border-t border-border-subtle text-text-muted text-center h-10 flex justify-center items-center">
        Hecho con amor 🖤 - Jefred</footer>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./src/secrets.js"></script>
    <script src="./src/nodes.js"></script>
    <script src="./src/main.js"></script>
    <script src="./src/navigation.js"></script>

</body>

</html>
